services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/sklearn_classifier/latest/classifier.joblib
      PREDICTION_LOGGING: "true"
    volumes:
      # Mount trained artifacts from host (path is relative to compose file)
      - ./models:/app/models:ro

